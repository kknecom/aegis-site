<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1F3C;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Hexagon -->
  <polygon points="70,8 116,34 116,86 70,112 24,86 24,34"
           fill="url(#hexGrad)" stroke="#C8973A" stroke-width="2.5"/>
  <!-- Inner hex ring -->
  <polygon points="70,18 106,40 106,80 70,102 34,80 34,40"
           fill="none" stroke="#C8973A" stroke-width="0.8" opacity="0.4"/>

  <!-- Stylised A — white left, gold right, gold crossbar -->
  <line x1="50" y1="92" x2="70" y2="36" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="92" x2="70" y2="36" stroke="#C8973A" stroke-width="8" stroke-linecap="round"/>
  <line x1="54" y1="71" x2="86" y2="71" stroke="#C8973A" stroke-width="4.5" stroke-linecap="round"/>

  <!-- AEGIS wordmark -->
  <text x="136" y="82"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="58"
        fill="#0D1F3C"
        letter-spacing="10">AEGIS</text>
</svg>
